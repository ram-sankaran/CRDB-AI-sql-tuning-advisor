# GitHub Pages Configuration for SQL Tuning Advisor

# Theme (using remote theme for GitHub Pages)
remote_theme: just-the-docs/just-the-docs
color_scheme: light

# Plugins required for remote theme
plugins:
  - jekyll-remote-theme

# Site settings
title: SQL Tuning Advisor
description: AI-Powered Query Analysis for CockroachDB
baseurl: "/CRDB-AI-sql-tuning-advisor"
url: "https://ram-sankaran.github.io"

# Repository
repository: ram-sankaran/CRDB-AI-sql-tuning-advisor
github_username: ram-sankaran

# Navigation
nav_enabled: true
nav_sort: order

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: true

# Aux links (top right)
aux_links:
  "Download":
    - "https://github.com/ram-sankaran/CRDB-AI-sql-tuning-advisor/releases"
  "GitHub":
    - "https://github.com/ram-sankaran/CRDB-AI-sql-tuning-advisor"

# Footer
footer_content: "Copyright &copy; 2026. Distributed under the MIT License. Built for CockroachDB users."

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Callouts
callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

# Code
enable_copy_code_button: true

# Mermaid diagrams
mermaid:
  version: "9.1.6"

# Heading anchors
heading_anchors: true

# Collections
collections:
  docs:
    permalink: "/:path/"
    output: true

# Defaults
defaults:
  - scope:
      path: ""
      type: "docs"
    values:
      layout: "default"

# Exclude from processing
exclude:
  - node_modules/
  - Gemfile
  - Gemfile.lock
  - README.md
